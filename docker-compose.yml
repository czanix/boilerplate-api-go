services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: czanix
      POSTGRES_USER: czanix
      POSTGRES_PASSWORD: czanix_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
volumes:
  pgdata:
